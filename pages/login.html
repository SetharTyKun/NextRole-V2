<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | NextRole — Your Next Career Move</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../style.css">
    <script src="../components/navbar.js" defer></script>
    <script src="../components/footer.js" defer></script>
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      .glass {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      }
      .mesh-bg {
        background: #F8FAFC;
        background-image: radial-gradient(at 50% 0%, #FFFFFF 0, transparent 70%);
      }
      @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(2deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }
    </style>
  </head>

  <body class="mesh-bg min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Decorative floating elements -->
    <div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary/5 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-[10%] right-[5%] w-80 h-80 bg-accent/10 rounded-full blur-3xl animate-float" style="animation-delay: -2s;"></div>

    <div class="w-full max-w-[480px] z-10">
      <!-- Logo section -->
      <div class="flex flex-col items-center mb-8 animate-fadeIn">
        <div class="flex items-center gap-3 text-[24px] font-extrabold text-secondary mb-2 cursor-pointer" onclick="window.location.href='index.html'">
            <img src="../asset/logo.svg" alt="NextRole" width="32" height="32" class="w-8 h-8"/>
          NextRole
        </div>
        <p class="text-secondary/70 text-sm font-medium">Welcome back! Please enter your details.</p>
      </div>

      <!-- Login Card -->
      <div class="glass rounded-[32px] p-6 md:p-10 shadow-2xl animate-slideUp">
        <h1 class="text-[28px] font-bold text-secondary mb-8">Sign In</h1>
        
        <form id="login-form" class="space-y-6">
          <!-- Email Field -->
          <div class="space-y-2">
            <label for="email" class="text-sm font-bold text-secondary/70 ml-1">Email Address</label>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-muted group-focus-within:text-primary transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="email" placeholder="you@example.com" required
                class="w-full pl-12 pr-4 py-4 bg-white border border-border rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text font-medium placeholder:text-muted/60 shadow-sm" />
            </div>
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
              <label for="password" class="text-sm font-bold text-secondary/70">Password</label>
              <a href="#" class="text-xs font-bold text-primary hover:text-secondary transition-colors">Forgot Password?</a>
            </div>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-muted group-focus-within:text-primary transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              </span>
              <input type="password" id="password" placeholder="••••••••" required
                class="w-full pl-12 pr-12 py-4 bg-white border border-border rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-text font-medium placeholder:text-muted/60 shadow-sm" />
              <button type="button" id="toggle-password"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-primary transition-colors">
                <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg id="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Feedback messages -->
          <div id="login-success" class="hidden text-sm font-semibold text-green-700 bg-green-50 border border-green-200 rounded-xl p-3 text-center"></div>
          <div id="login-error" class="hidden text-sm font-semibold text-red-600 bg-red-50 border border-red-200 rounded-xl p-3 text-center"></div>

          <!-- Submit Button -->
          <button type="submit"
            class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/25 hover:bg-secondary hover:shadow-secondary/25 transform hover:-translate-y-0.5 active:scale-[0.98] transition-all">
            Sign In to Account
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-border"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="px-4 bg-white/0 text-muted font-bold uppercase tracking-wider">Or continue with</span>
          </div>
        </div>

        <!-- Social Logins -->
        <div class="grid grid-cols-2 gap-4">
          <button class="flex items-center justify-center gap-3 py-3 border border-border rounded-2xl bg-white hover:bg-bg transition-colors font-bold text-sm text-secondary shadow-sm">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
            Google
          </button>
          <button class="flex items-center justify-center gap-3 py-3 border border-border rounded-2xl bg-white hover:bg-bg transition-colors font-bold text-sm text-secondary shadow-sm">
            <img src="https://www.linkedin.com/favicon.ico" class="w-5 h-5" alt="LinkedIn">
            LinkedIn
          </button>
        </div>

        <!-- Footer -->
        <p class="mt-8 text-center text-sm font-medium text-muted">
          Don't have an account? 
          <a href="register.html" class="text-primary font-bold hover:text-secondary transition-colors">Sign up for free</a>
        </p>
      </div>

      <!-- Back Link -->
      <div class="mt-8 text-center">
        <a href="index.html" class="inline-flex items-center gap-2 text-sm font-bold text-secondary/70 hover:text-secondary transition-colors">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Homepage
        </a>
      </div>
    </div>

  <script>
    // Redirect if already logged in
    try {
      if (JSON.parse(localStorage.getItem('nextrole_session'))) {
        window.location.href = '/index.html';
      }
    } catch {}

    // Show success message after registration
    const params = new URLSearchParams(window.location.search);
    if (params.get('registered') === '1') {
      const s = document.getElementById('login-success');
      s.textContent = 'Account created successfully! Please sign in.';
      s.classList.remove('hidden');
    }

    document.getElementById('toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      document.getElementById('eye-icon').classList.toggle('hidden', isHidden);
      document.getElementById('eye-off-icon').classList.toggle('hidden', !isHidden);
    });

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      const successEl = document.getElementById('login-success');

      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      const users = JSON.parse(localStorage.getItem('nextrole_users') || '[]');
      const user = users.find(
        u => u.email.toLowerCase() === email.toLowerCase() && u.password === password
      );

      if (!user) {
        errorEl.textContent = 'Invalid email or password.';
        errorEl.classList.remove('hidden');
        return;
      }

      const session = { id: user.id, name: user.name, email: user.email, role: user.role };
      localStorage.setItem('nextrole_session', JSON.stringify(session));
      sessionStorage.setItem('nextrole_just_logged_in', '1');
      window.location.href = '/index.html';
    });
  </script>
  </body>
</html>
